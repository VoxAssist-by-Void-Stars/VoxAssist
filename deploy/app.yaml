# DigitalOcean App Platform — VoxAssist
# Spec: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Create via:  doctl apps create --spec deploy/app.yaml
# Or paste into App Platform → Create App → "App Spec"
#
# Set secret values in the DO dashboard (Settings → App-Level Environment Variables).
# Hybrid demo: USE_MOCK_AI=false + AI_FALLBACK_TO_MOCK=true (real Atlas when ready;
# mock LLM/retrieval if teammate modules or keys fail).

name: voxassist
region: nyc

services:
  - name: web
    environment_slug: node-js
    github:
      repo: CynicalD/VoxAssist
      branch: lane/app
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 10
    envs:
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET
      - key: VOYAGE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_BASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      # NEXT_PUBLIC_* must be present at build time for the client bundle.
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLERK_OWNER_MAP
        scope: RUN_TIME
        type: SECRET
      - key: USE_MOCK_AI
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: AI_FALLBACK_TO_MOCK
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: ALLOW_HTTP_INGEST
        scope: RUN_TIME
        value: "false"
      - key: LLM_RATE_LIMIT_PER_MINUTE
        scope: RUN_TIME
        value: "30"
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: "production"
