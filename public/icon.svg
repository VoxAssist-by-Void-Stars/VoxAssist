<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tileGlow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"></stop>
      <stop offset="72%" stop-color="#8b5cf6" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="hubRing" x1="90" y1="66" x2="90" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"></stop>
      <stop offset="52%" stop-color="#9d84f4"></stop>
      <stop offset="100%" stop-color="#6d63ea"></stop>
    </linearGradient>
    <linearGradient id="armGrad" x1="90" y1="66" x2="90" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"></stop>
      <stop offset="100%" stop-color="#7c5cf0"></stop>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#160c30"></stop>
      <stop offset="34%" stop-color="#1c1038"></stop>
      <stop offset="60%" stop-color="#5b3fc0"></stop>
      <stop offset="82%" stop-color="#8b5cf6"></stop>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="180" height="180" rx="40" fill="#0a0a0a"></rect>
  <rect width="180" height="180" rx="40" fill="url(#tileGlow)"></rect>

  
  <g stroke="url(#armGrad)" stroke-width="7" stroke-linecap="round">
    <line x1="90" y1="62" x2="90" y2="48"></line>
    <line x1="118" y1="90" x2="132" y2="90"></line>
    <line x1="90" y1="118" x2="90" y2="132"></line>
    <line x1="62" y1="90" x2="48" y2="90"></line>
  </g>

  
  <g>
    <circle cx="90" cy="34" r="19" fill="url(#orb)"></circle>
    <circle cx="146" cy="90" r="19" fill="url(#orb)"></circle>
    <circle cx="90" cy="146" r="19" fill="url(#orb)"></circle>
    <circle cx="34" cy="90" r="19" fill="url(#orb)"></circle>
  </g>

  
  <circle cx="90" cy="90" r="22" fill="none" stroke="url(#hubRing)" stroke-width="11"></circle>
